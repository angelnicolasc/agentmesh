# AgentMesh Policy Template: Healthcare (HIPAA-Aligned)
# Based on: HIPAA Privacy Rule, HIPAA Security Rule, HITECH Act
#
# Usage:
#   extends: healthcare
#   (in your .agentmesh.yaml)

governance_level: strict

policies:
  odd:
    enforcement_mode: enforce
    default_policy: deny

  magnitude:
    max_spend_per_action_usd: 50.00
    max_spend_per_session_usd: 200.00
    max_records_per_action: 25

  dlp:
    mode: enforce
    sensitivity: high

  hitl:
    mode: enforce
    triggers:
      tool_types: [write, execute]
      trust_score_below: 80
    timeout_action: reject
    approval_timeout_minutes: 10

  intent_verification:
    mode: enforce
    required_for:
      tool_types: [write, execute]
    anti_replay: true

  circuit_breaker:
    agent_level:
      failure_threshold: 3
      time_window_seconds: 60
      recovery_timeout_seconds: 120

  audit:
    enabled: true
    cryptographic: true
    retention_days: 2190
