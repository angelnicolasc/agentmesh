# AgentMesh Policy Template: Enterprise Maximum Governance
# For organizations requiring the strictest compliance posture.
#
# Usage:
#   extends: enterprise
#   (in your .agentmesh.yaml)

governance_level: strict

policies:
  odd:
    enforcement_mode: enforce
    default_policy: deny

  magnitude:
    max_spend_per_action_usd: 25.00
    max_spend_per_session_usd: 100.00
    max_records_per_action: 25
    enforcement_mode: enforce

  dlp:
    mode: enforce
    sensitivity: high

  hitl:
    mode: enforce
    triggers:
      tool_types: [write, execute, payment, network]
      trust_score_below: 80
      spend_above_usd: 10.00
    timeout_action: reject
    approval_timeout_minutes: 15

  intent_verification:
    mode: enforce
    required_for:
      tool_types: [payment, write, execute]
    anti_replay: true
    intent_ttl_seconds: 120

  circuit_breaker:
    agent_level:
      failure_threshold: 3
      time_window_seconds: 60
      recovery_timeout_seconds: 180

  audit:
    enabled: true
    cryptographic: true
    retention_days: 365

  a2a:
    mode: enforce
    auth:
      method: did_exchange
      auto_rotate: true
      rotation_hours: 12

  topology:
    enabled: true
