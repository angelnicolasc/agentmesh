# AgentMesh Policy Template: EU AI Act High-Risk Compliance
# Based on: EU AI Act (Regulation 2024/1689), ISO 42001
#
# Usage:
#   extends: eu-ai-act
#   (in your .agentmesh.yaml)

governance_level: strict

policies:
  odd:
    enforcement_mode: enforce
    default_policy: deny

  magnitude:
    max_spend_per_action_usd: 50.00
    max_spend_per_session_usd: 200.00
    max_records_per_action: 50

  dlp:
    mode: enforce
    sensitivity: high

  hitl:
    mode: enforce
    triggers:
      tool_types: [write, execute, payment]
      trust_score_below: 70
    timeout_action: reject
    approval_timeout_minutes: 30

  intent_verification:
    mode: enforce
    required_for:
      tool_types: [payment, write, execute]
    anti_replay: true

  circuit_breaker:
    agent_level:
      failure_threshold: 3
      time_window_seconds: 60
      recovery_timeout_seconds: 60

  audit:
    enabled: true
    cryptographic: true
    retention_days: 3650
