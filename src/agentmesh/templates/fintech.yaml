# AgentMesh Policy Template: Financial Services
# Based on: MiFID II, PSD2, SOX, SEC Rule 15c3-5
#
# Usage:
#   extends: fintech
#   (in your .agentmesh.yaml)

governance_level: strict

policies:
  odd:
    enforcement_mode: enforce
    default_policy: deny

  magnitude:
    max_spend_per_action_usd: 100.00
    max_spend_per_session_usd: 500.00
    max_records_per_action: 50

  dlp:
    mode: enforce
    sensitivity: high

  hitl:
    mode: enforce
    triggers:
      tool_types: [payment, write, execute]
      spend_above_usd: 50.00
      trust_score_below: 70
    timeout_action: reject
    approval_timeout_minutes: 15

  intent_verification:
    mode: enforce
    required_for:
      tool_types: [payment, write]
    anti_replay: true

  circuit_breaker:
    agent_level:
      failure_threshold: 3
      time_window_seconds: 60
      recovery_timeout_seconds: 120

  audit:
    enabled: true
    cryptographic: true
    retention_days: 365
